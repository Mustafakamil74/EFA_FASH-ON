
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EFA FASHION ERP</title>
<style>
body{font-family:Tahoma;margin:0;background:#f4f0e8}
header{background:#1f1f1f;color:#fff;padding:20px;text-align:center}
nav{background:#2a2a2a;padding:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
button.delete-btn{background:#e74c3c;color:#fff}
nav button{background:#f4f0e8}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px 0}
input,select{width:100%;padding:8px;margin:5px 0}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:8px}
.item-delete-btn{width:38px;height:38px;border:none;border-radius:50%;background:#e74c3c;color:#fff;font-size:20px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.18);transition:transform .18s ease, background .18s ease, opacity .18s ease}
.item-delete-btn:hover{background:#d64541;transform:scale(1.08);opacity:1}
.item-delete-btn:active{transform:scale(.98)}
#addInvoiceItemBtn{padding:10px 14px;border:none;border-radius:20px;background:#27ae60;color:#fff;font-weight:bold;cursor:pointer;margin:0 0 10px 0}
#addInvoiceItemBtn:hover{opacity:.9}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:6px}
</style>
</head>
<body>
<header>
  <h1>EFA FASHION ERP</h1>
  <p id="headerSubtitle">إدارة زبائن ومحلات ومعامل وإيصالات وحسابات</p>
  <div class="lang-switch">
    <button type="button" onclick="setLanguage('ar')">عربي</button>
    <button type="button" onclick="setLanguage('tr')">Türkçe</button>
  </div>
</header>
<nav>
  <button type="button" id="dashboardBtn" onclick="show('dashboard')">الرئيسية</button>
  <button type="button" id="customersBtn" onclick="show('customers')">الزبائن</button>
  <button type="button" id="shopsBtn" onclick="show('shops')">المحلات</button>
  <button type="button" id="factoriesBtn" onclick="show('factories')">المعامل</button>
  <button type="button" id="inventoryBtn" onclick="show('inventory')">المخزون</button>
  <button type="button" id="invoicesBtn" onclick="show('invoices')">الإيصالات</button>
  <button type="button" id="accountsBtn" onclick="show('accounts')">الحسابات</button>
  <button type="button" id="reportsBtn" onclick="show('reports')">التقارير</button>
</nav>

<div id="dashboard" class="page active"><div class="card"><h2 id="dashboardTitle">لوحة التحكم</h2><p id="dashboardDesc">نظام EFA FASHION</p><button id="backupAllBtn" type="button" onclick="backupAll()">نسخ احتياطي شامل</button> <button id="restoreAllBtn" type="button" onclick="restoreAll()">استعادة شاملة</button></div></div>

<div id="customers" class="page"><div class="card"><h3 id="customersTitle">إضافة زبون</h3><input id="ccode" placeholder="كود الزبون"><input id="cname" placeholder="اسم الزبون"><input id="cphone" placeholder="هاتف"><input id="caddress" placeholder="العنوان"><input id="cnote" placeholder="ملاحظة"><button id="customersSaveBtn" type="button" onclick="addRecord('customersData')">حفظ</button> <button id="customersExportBtn" type="button" onclick="exportData('efa_customers.json','customersData')">تصدير</button> <button id="customersImportBtn" type="button" onclick="importData('customersData')">استيراد</button><input id="custSearch" oninput="load()" placeholder="بحث"><div id="customersView"></div></div></div>

<div id="shops" class="page"><div class="card"><h3 id="shopsTitle">إضافة محل</h3><input id="scode" placeholder="كود المحل"><input id="sname" placeholder="اسم المحل"><input id="sphone" placeholder="هاتف"><input id="saddress" placeholder="عنوان"><input id="snote" placeholder="ملاحظة"><button id="shopsSaveBtn" type="button" onclick="addRecord('shopsData')">حفظ</button> <button id="shopsExportBtn" type="button" onclick="exportData('efa_shops.json','shopsData')">تصدير</button> <button id="shopsImportBtn" type="button" onclick="importData('shopsData')">استيراد</button><input id="shopSearch" oninput="load()" placeholder="بحث"><div id="shopsView"></div></div></div>

<div id="factories" class="page"><div class="card"><h3 id="factoriesTitle">إضافة معمل</h3><input id="fcode" placeholder="كود المعمل"><input id="fname" placeholder="اسم المعمل"><input id="fphone" placeholder="هاتف"><input id="faddress" placeholder="عنوان"><input id="fnote" placeholder="ملاحظة"><button id="factoriesSaveBtn" type="button" onclick="addRecord('factoriesData')">حفظ</button> <button id="factoriesExportBtn" type="button" onclick="exportData('efa_factories.json','factoriesData')">تصدير</button> <button id="factoriesImportBtn" type="button" onclick="importData('factoriesData')">استيراد</button><input id="factSearch" oninput="load()" placeholder="بحث"><div id="factoriesView"></div></div></div>

<div id="inventory" class="page"><div class="card"><h3 id="inventoryTitle">المخزون</h3><input id="pcode" placeholder="رمز المنتج"><input id="pname" placeholder="اسم المنتج"><input id="pcolor" placeholder="اللون"><input id="pprice" type="number" min="0" step="any" placeholder="سعر البيع"><input id="popening" type="number" min="0" step="any" placeholder="رصيد افتتاحي"><input id="preorder" type="number" min="0" step="any" placeholder="حد إعادة الطلب"><button id="productsSaveBtn" type="button" onclick="addRecord('productsData')">حفظ</button> <button id="productsExportBtn" type="button" onclick="exportData('efa_products.json','productsData')">تصدير</button> <button id="productsImportBtn" type="button" onclick="importData('productsData')">استيراد</button><input id="prodSearch" oninput="load()" placeholder="بحث"><div id="productsView"></div></div></div>

<div id="invoices" class="page">
<div class="card">
<h3 id="invoicesTitle">الإيصالات</h3>
<select id="invbranch">
  <option value="MERKEZ">MERKEZ</option>
  <option value="DEP0">DEP0</option>
</select>
<input id="invno" readonly placeholder="رقم الإيصال">
<input type="date" id="invdate">
<div id="invoiceItems">
  <div class="item-row">
    <input class="invoice-product" placeholder="اسم المنتج">
    <input class="invoice-color" placeholder="اللون">
    <input class="invoice-qty" type="number" min="0" step="any" placeholder="العدد">
    <input class="invoice-price" type="number" min="0" step="any" placeholder="السعر">
    <button type="button" class="item-delete-btn" onclick="removeInvoiceItem(this)">×</button>
  </div>
</div>
<button id="addInvoiceItemBtn" type="button" onclick="addInvoiceItem()">+ إضافة منتج</button>
<button id="invoiceSaveBtn" type="button" onclick="saveInvoice()">حفظ الإيصال</button>
<button id="invoiceExportBtn" type="button" onclick="exportData('efa_invoices.json','efaInvoices')">تصدير الإيصالات</button>
<button id="invoiceImportBtn" type="button" onclick="importData('efaInvoices')">استيراد الإيصالات</button>
<input id="invSearch" oninput="load()" placeholder="بحث"><div id="invoiceView"></div>
</div></div>

<div id="reports" class="page"><div class="card"><h3 id="reportsTitle">التقارير</h3><div id="reportsView"></div></div></div>

<div id="accounts" class="page">
<div class="card">
<h3 id="accountsTitle">حسابات الزبائن</h3>
  <select id="acctype"><option value="customer">زبون</option><option value="shop">محل</option><option value="supplier">مورد</option></select>
  <select id="acctEntity"><option value="">-</option></select>
  <select id="accinv"><option value="" id="accInvPlaceholderOption">رقم الإيصال</option></select>
  <input type="date" id="accdate">
  <select id="currency"><option value="USD" id="currencyOpt1">دولار</option><option value="TRY" id="currencyOpt2">ليرة تركية</option><option value="CHK" id="currencyOpt3">شيك</option></select>
  <input id="amount" type="number" min="0" step="any" placeholder="المبلغ">
  <div id="checkFields" style="display:none">
    <input type="date" id="checkDate" placeholder="تاريخ الشيك">
    <input type="date" id="finalDate" placeholder="تاريخ آخر سداد">
  </div>
  <button id="accountSaveBtn" type="button" onclick="saveAccount()">حفظ</button>
<button id="accountExportBtn" type="button" onclick="exportData('efa_accounts.json','efaAccounts')">تصدير الحسابات</button>
<button id="accountImportBtn" type="button" onclick="importData('efaAccounts')">استيراد الحسابات</button>
<input id="accSearch" oninput="load()" placeholder="بحث"><div id="accountView"></div>
</div></div>

<script>
function escapeHtml(value){
 return String(value==null?'':value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toNum(value){const n=parseFloat(value);return isFinite(n)?n:0;}
function getInvoiceItems(i){return Array.isArray(i.items)&&i.items.length?i.items:[{product:i.product||'',color:i.color||'',qty:i.qty||'',price:i.price||''}];}
function lineTotal(it){return toNum(it.qty)*toNum(it.price);}
function invoiceTotal(i){return getInvoiceItems(i).reduce((s,it)=>s+lineTotal(it),0);}
function invoiceByNo(no){return JSON.parse(localStorage.getItem('efaInvoices')||'[]').find(i=>i.no===no)||null;}
function invoicePaid(no){return JSON.parse(localStorage.getItem('efaAccounts')||'[]').filter(a=>a.invoice===no).reduce((s,a)=>s+toNum(a.amount),0);}
function invoiceRemaining(no){const inv=invoiceByNo(no);return inv?invoiceTotal(inv)-invoicePaid(no):0;}
function searchValue(id){const el=document.getElementById(id);return el?el.value.trim().toLowerCase():'';}
function matchesQuery(obj,q){if(!q) return true;return Object.values(obj).some(v=>typeof v==='string'&&v.toLowerCase().includes(q));}
function invoiceMatches(i,q){if(!q) return true;return [i.no,i.date,i.branch].concat(getInvoiceItems(i).map(it=>`${it.product||''} ${it.color||''}`)).join(' ').toLowerCase().includes(q);}
function accountMatches(a,q){if(!q) return true;return [a.type,a.entityCode,a.entityName,a.invoice,a.date,a.amount,a.currency].join(' ').toLowerCase().includes(q);}
function productSold(name){
 const key=String(name||'').trim().toLowerCase();
 if(!key) return 0;
 let sold=0;
 JSON.parse(localStorage.getItem('efaInvoices')||'[]').forEach(inv=>getInvoiceItems(inv).forEach(it=>{ if(String(it.product||'').trim().toLowerCase()===key) sold+=toNum(it.qty); }));
 return sold;
}
function productOnHand(p){return toNum(p.opening)-productSold(p.name);}
function lowStockProducts(){return JSON.parse(localStorage.getItem('productsData')||'[]').filter(p=>productOnHand(p)<=toNum(p.reorder));}
function renderReports(){
 const view=document.getElementById('reportsView');
 if(!view) return;
 const t=translations[currentLang]||translations.ar;
 const invoices=JSON.parse(localStorage.getItem('efaInvoices')||'[]');
 const accounts=JSON.parse(localStorage.getItem('efaAccounts')||'[]');
 const totalSales=invoices.reduce((s,i)=>s+invoiceTotal(i),0);
 const totalPaid=accounts.reduce((s,a)=>s+toNum(a.amount),0);
 const byBranch={};
 invoices.forEach(i=>{const b=i.branch||'-'; byBranch[b]=(byBranch[b]||0)+invoiceTotal(i);});
 let salesHtml='<h4>'+t.salesReportTitle+'</h4><table><tr><th>'+t.reportMetric+'</th><th>'+t.reportValue+'</th></tr>'+
   `<tr><td>${t.reportInvoiceCount}</td><td>${invoices.length}</td></tr>`+
   `<tr><td>${t.reportTotalSales}</td><td>${totalSales.toFixed(2)}</td></tr>`+
   `<tr><td>${t.reportTotalPaid}</td><td>${totalPaid.toFixed(2)}</td></tr>`+
   `<tr><td>${t.reportOutstanding}</td><td>${(totalSales-totalPaid).toFixed(2)}</td></tr>`+
   Object.keys(byBranch).map(b=>`<tr><td>${escapeHtml(b)}</td><td>${byBranch[b].toFixed(2)}</td></tr>`).join('')+'</table>';
 const map={};
 accounts.forEach(a=>{
  const key=`${a.type}|${a.entityCode||''}|${a.entityName||''}`;
  if(!map[key]) map[key]={type:a.type,code:a.entityCode||'',name:a.entityName||'',invoices:{},paid:0};
  map[key].paid+=toNum(a.amount);
  if(a.invoice) map[key].invoices[a.invoice]=true;
 });
 const entityRows=Object.values(map).map(e=>{
  const invoiced=Object.keys(e.invoices).reduce((s,no)=>{const inv=invoiceByNo(no);return s+(inv?invoiceTotal(inv):0);},0);
  return {...e,invoiced,remaining:invoiced-e.paid};
 });
 let balHtml='<h4>'+t.balancesReportTitle+'</h4>'+(entityRows.length?'<table><tr><th>'+t.accTypeHeader+'</th><th>'+t.accEntityHeader+'</th><th>'+t.reportInvoiced+'</th><th>'+t.invoicePaidHeader+'</th><th>'+t.invoiceRemainingHeader+'</th></tr>'+
   entityRows.map(e=>`<tr><td>${escapeHtml(e.type)}</td><td>${escapeHtml(e.code?e.code+' - '+e.name:e.name)}</td><td>${e.invoiced.toFixed(2)}</td><td>${e.paid.toFixed(2)}</td><td>${e.remaining.toFixed(2)}</td></tr>`).join('')+'</table>':'<div>'+t.noData+'</div>');
 const today=new Date().toISOString().slice(0,10);
 const cheques=accounts.filter(a=>a.currency==='CHK').slice().sort((a,b)=>String(a.finalDate||'').localeCompare(String(b.finalDate||'')));
 let chkHtml='<h4>'+t.chequeCalendarTitle+'</h4>'+(cheques.length?'<table><tr><th>'+t.accEntityHeader+'</th><th>'+t.accAmountHeader+'</th><th>'+t.checkDateLabel+'</th><th>'+t.finalDateLabel+'</th></tr>'+
   cheques.map(c=>{const overdue=c.finalDate&&c.finalDate<today;return `<tr style="${overdue?'background:#fdecea':''}"><td>${escapeHtml(c.entityCode?c.entityCode+' - '+(c.entityName||''):(c.entityName||''))}</td><td>${toNum(c.amount).toFixed(2)}</td><td>${escapeHtml(c.checkDate||'')}</td><td>${overdue?'<strong>':''}${escapeHtml(c.finalDate||'')}${overdue?' \u26a0':''}${overdue?'</strong>':''}</td></tr>`;}).join('')+'</table>':'<div>'+t.noData+'</div>');
 view.innerHTML=salesHtml+'<hr>'+balHtml+'<hr>'+chkHtml;
}
function show(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active'); load();}
const recordFields={
 customersData:{inputs:['ccode','cname','cphone','caddress','cnote'],props:['code','name','phone','address','note']},
 shopsData:{inputs:['scode','sname','sphone','saddress','snote'],props:['code','name','phone','address','note']},
 factoriesData:{inputs:['fcode','fname','fphone','faddress','fnote'],props:['code','name','phone','address','note']},
 productsData:{inputs:['pcode','pname','pcolor','pprice','popening','preorder'],props:['code','name','color','price','opening','reorder']}
};
const editIndexes={customersData:-1,shopsData:-1,factoriesData:-1,productsData:-1};
let currentInvoiceEditIndex=-1;
let currentAccountEditIndex=-1;
function addInvoiceItem(product='', color='', qty='', price=''){
 const container=document.getElementById('invoiceItems');
 const row=document.createElement('div');
 const t=translations[currentLang]||translations.ar;
 row.className='item-row';
 row.innerHTML=`<input class="invoice-product" placeholder="${t.invProductPlaceholder}" value="${escapeHtml(product)}">`+
               `<input class="invoice-color" placeholder="${t.invColorPlaceholder}" value="${escapeHtml(color)}">`+
               `<input class="invoice-qty" type="number" min="0" step="any" placeholder="${t.invQtyPlaceholder}" value="${escapeHtml(qty)}">`+
               `<input class="invoice-price" type="number" min="0" step="any" placeholder="${t.invPricePlaceholder}" value="${escapeHtml(price)}">`+
               `<button type="button" class="item-delete-btn" onclick="removeInvoiceItem(this)">×</button>`;
 container.appendChild(row);
}
function resetInvoiceItems(){
 const container=document.getElementById('invoiceItems');
 container.innerHTML='';
 addInvoiceItem();
}
function removeInvoiceItem(button){
 const row=button.closest('.item-row');
 const container=document.getElementById('invoiceItems');
 if(!row||!container) return;
 if(container.children.length>1){
   container.removeChild(row);
 } else {
   resetInvoiceItems();
 }
}
function addRecord(key){
 const def=recordFields[key];
 if(!def) return;
 const t=translations[currentLang]||translations.ar;
 const values=def.inputs.map(id=>document.getElementById(id).value.trim());
 if(!values[0]) return;
 const data=JSON.parse(localStorage.getItem(key)||'[]');
 const codeIdx=def.props.indexOf('code');
 if(codeIdx>=0){
  const codeVal=(values[codeIdx]||'').toLowerCase();
  if(codeVal && data.some((rec,idx)=> idx!==editIndexes[key] && String(rec.code||'').trim().toLowerCase()===codeVal)){
   alert(t.duplicateCode);
   return;
  }
 }
 const record=def.props.reduce((acc,p,i)=>{acc[p]=values[i];return acc;},{});
 if(editIndexes[key]>=0){
 data[editIndexes[key]]=record;
 editIndexes[key]=-1;
 } else {
 data.push(record);
 }
 localStorage.setItem(key,JSON.stringify(data));
 def.inputs.forEach(id=>document.getElementById(id).value='');
 load();
}
function editRecord(key,index){
 const data=JSON.parse(localStorage.getItem(key)||'[]');
 if(index<0||index>=data.length) return;
 const record=data[index];
 const def=recordFields[key];
 if(!def) return;
 def.inputs.forEach((id,i)=>{
 document.getElementById(id).value=record[def.props[i]]||'';
 });
 editIndexes[key]=index;
}
function saveInvoice(){
 let invNo=document.getElementById('invno').value.trim();
 const invDate=document.getElementById('invdate').value;
 const invBranch=document.getElementById('invbranch').value;
 const items=Array.from(document.querySelectorAll('#invoiceItems .item-row')).map(row=>({
   product: row.querySelector('.invoice-product').value.trim(),
   color: row.querySelector('.invoice-color').value.trim(),
   qty: row.querySelector('.invoice-qty').value.trim(),
   price: row.querySelector('.invoice-price').value.trim()
 })).filter(item=>item.product);
 const firstItem=items[0]||null;
 if(!firstItem || !firstItem.product || !firstItem.qty || !firstItem.price){
 const messages={ar:'اسم المنتج والعدد والسعر مطلوبان. يرجى التحقق.',tr:'Ürün adı, adet ve fiyat gereklidir. Lütfen kontrol edin.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 if(items.some(item=>item.product && (!item.qty || !item.price))){
 const messages={ar:'يرجى إدخال العدد والسعر لكل منتج.',tr:'Her ürün için adet ve fiyat giriniz.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 if(items.some(item=>toNum(item.qty)<=0 || toNum(item.price)<0)){
 const messages={ar:'العدد والسعر يجب أن يكونا أرقاماً صالحة.',tr:'Adet ve fiyat geçerli sayı olmalıdır.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 if(!invNo){
 invNo=getNextInvoiceNumber();
 document.getElementById('invno').value=invNo;
 }
 const data=JSON.parse(localStorage.getItem('efaInvoices')||'[]');
 const duplicateInvoice = data.some((item, idx)=>(item.no===invNo && idx!==currentInvoiceEditIndex));
 if(duplicateInvoice){
 const messages={ar:'رقم الإيصال مستخدم بالفعل. يرجى تغييره.',tr:'Fiş numarası zaten kullanılıyor. Lütfen değiştirin.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 if(currentInvoiceEditIndex>=0){
 data[currentInvoiceEditIndex]={no:invNo,date:invDate,branch:invBranch,items};
 currentInvoiceEditIndex=-1;
 } else {
 data.push({no:invNo,date:invDate,branch:invBranch,items});
 }
 localStorage.setItem('efaInvoices',JSON.stringify(data));
 document.getElementById('invno').value='';
 document.getElementById('invdate').value='';
 document.getElementById('invbranch').value='MERKEZ';
 resetInvoiceItems();
 currentInvoiceEditIndex=-1;
 load();
}
function editInvoice(index){
 const data=JSON.parse(localStorage.getItem('efaInvoices')||'[]');
 if(index<0||index>=data.length) return;
 const item=data[index];
 document.getElementById('invno').value=item.no||'';
 document.getElementById('invdate').value=item.date||'';
 document.getElementById('invbranch').value=item.branch||'MERKEZ';
 const container=document.getElementById('invoiceItems');
 container.innerHTML='';
 const rows=Array.isArray(item.items) && item.items.length ? item.items : [{product:item.product||'', color:item.color||'', qty:item.qty||'', price:item.price||''}];
 rows.forEach(it=>addInvoiceItem(it.product,it.color,it.qty,it.price));
 currentInvoiceEditIndex=index;
}
function saveAccount(){
 let invoice=document.getElementById('accinv').value.trim();
 const date=document.getElementById('accdate').value;
 const currency=document.getElementById('currency').value;
 const amount=document.getElementById('amount').value.trim();
 const type=document.getElementById('acctype').value;
 const entityCode=document.getElementById('acctEntity').value;
 // try to fetch entity name/details
 let entityName='';
 let entityObj=null;
 if(entityCode){
   const arr=(type==='customer')?JSON.parse(localStorage.getItem('customersData')||'[]'):(type==='shop'?JSON.parse(localStorage.getItem('shopsData')||'[]'):JSON.parse(localStorage.getItem('factoriesData')||'[]'));
   entityObj=arr.find(it=> (it.code||it.name||'')===entityCode || (it.code===entityCode));
   if(entityObj){ entityName=entityObj.name||''; }
 }
 if(!invoice){
 const select=document.getElementById('accinv');
 const autoOption=Array.from(select.options).find(o=>o.value);
 if(autoOption){
 invoice=autoOption.value;
 }
 }
 if(!invoice || !amount){
 const messages={ar:'رقم الإيصال والمبلغ مطلوبان. يرجى التحقق.',tr:'Fiş numarası ve tutar zorunludur. Lütfen kontrol edin.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 if(toNum(amount)<=0){
 const messages={ar:'المبلغ يجب أن يكون رقماً صالحاً.',tr:'Tutar geçerli bir sayı olmalıdır.'};
 alert(messages[currentLang]||messages.ar);
 return;
 }
 const data=JSON.parse(localStorage.getItem('efaAccounts')||'[]');
 if(currentAccountEditIndex>=0){
 data[currentAccountEditIndex]={type,entityCode,entityName,invoice,date,currency,amount,checkDate:document.getElementById('checkDate').value||'',finalDate:document.getElementById('finalDate').value||''};
 currentAccountEditIndex=-1;
 } else {
 data.push({type,entityCode,entityName,invoice,date,currency,amount,checkDate:document.getElementById('checkDate').value||'',finalDate:document.getElementById('finalDate').value||''});
 }
 localStorage.setItem('efaAccounts',JSON.stringify(data));
 document.getElementById('accinv').value='';
 document.getElementById('accdate').value='';
 document.getElementById('currency').value='USD';
 document.getElementById('amount').value='';
 load();
}
function editAccount(index){
 const data=JSON.parse(localStorage.getItem('efaAccounts')||'[]');
 if(index<0||index>=data.length) return;
 const item=data[index];
  populateInvoiceSelect(item.invoice);
  // populate entity select for the type
  document.getElementById('acctype').value=item.type||'customer';
  populateEntitySelect(item.type||'customer');
  document.getElementById('acctEntity').value=item.entityCode||'';
  document.getElementById('accinv').value=item.invoice||'';
  document.getElementById('accdate').value=item.date||'';
  document.getElementById('currency').value=item.currency||'USD';
  document.getElementById('amount').value=item.amount||'';
  document.getElementById('checkDate').value=item.checkDate||'';
  document.getElementById('finalDate').value=item.finalDate||'';
  toggleCheckFields();
 currentAccountEditIndex=index;
}
function getNextInvoiceNumber(){
 const data=JSON.parse(localStorage.getItem('efaInvoices')||'[]');
 let max=0;
 data.forEach(item=>{
 const match=(item.no||'').match(/EFA-(\d+)/);
 if(match) max=Math.max(max,parseInt(match[1],10));
 });
 return 'EFA-'+String(max+1).padStart(5,'0');
}
function setNextInvoiceNumber(){
 document.getElementById('invno').value=getNextInvoiceNumber();
}
function populateInvoiceSelect(currentInvoice){
 const select=document.getElementById('accinv');
 const invoices=JSON.parse(localStorage.getItem('efaInvoices')||'[]');
 const accounts=JSON.parse(localStorage.getItem('efaAccounts')||'[]');
 const t=translations[currentLang]||translations.ar;
 select.innerHTML='';
 const placeholder=document.createElement('option');
 placeholder.value='';
 placeholder.textContent=t.accInvPlaceholder;
 placeholder.disabled=true;
 placeholder.selected=true;
 select.appendChild(placeholder);
 let currentInvoiceAdded=false;
 invoices.forEach(item=>{
 if(!item.no) return;
 const option=document.createElement('option');
 option.value=item.no;
 option.textContent=`${item.no}${item.date?` (${item.date})`:''} — ${t.remainingLabel}: ${invoiceRemaining(item.no).toFixed(2)}`;
 if(item.no===currentInvoice) currentInvoiceAdded=true;
 select.appendChild(option);
 });
 if(currentInvoice && !currentInvoiceAdded){
 const option=document.createElement('option');
 option.value=currentInvoice;
 option.textContent=`${currentInvoice} ${t.deletedInvoiceLabel}`.trim();
 select.appendChild(option);
 }
 // if editing, set current invoice; otherwise auto-select first available invoice
  if(currentInvoice){
    select.value=currentInvoice;
  } else {
    const opts=Array.from(select.options);
    const firstOptIndex=opts.findIndex(o=>o.value);
    if(firstOptIndex> -1){
      select.selectedIndex=firstOptIndex;
    }
  }
}
// populate entity selector based on account type
function populateEntitySelect(type){
 const select=document.getElementById('acctEntity');
 select.innerHTML='';
 let arr=[];
 if(type==='customer') arr=JSON.parse(localStorage.getItem('customersData')||'[]');
 else if(type==='shop') arr=JSON.parse(localStorage.getItem('shopsData')||'[]');
 else if(type==='supplier') arr=JSON.parse(localStorage.getItem('factoriesData')||'[]');
 arr = arr.slice().reverse();
 const placeholder=document.createElement('option');
 placeholder.value='';
 placeholder.textContent='-';
 select.appendChild(placeholder);
 arr.forEach(item=>{
   const o=document.createElement('option');
   o.value=item.code||item.name||'';
   o.textContent=`${item.code?item.code+' - ':''}${item.name||item.name||''}`;
   select.appendChild(o);
 });
}

function toggleCheckFields(){
 const cur=document.getElementById('currency').value;
 const el=document.getElementById('checkFields');
 if(cur==='CHK'){
   el.style.display='block';
   // default check date to today if empty
   const cd=document.getElementById('checkDate');
   const fd=document.getElementById('finalDate');
   const today=new Date().toISOString().slice(0,10);
   if(cd && !cd.value) cd.value=today;
   if(fd && !fd.value) fd.value='';
 } else {
   el.style.display='none';
 }
}

// attach handlers
document.addEventListener('DOMContentLoaded',()=>{
 const at=document.getElementById('acctype');
 if(at) at.addEventListener('change',e=>populateEntitySelect(e.target.value));
 const cur=document.getElementById('currency');
 if(cur) cur.addEventListener('change',toggleCheckFields);
 populateEntitySelect(document.getElementById('acctype').value);
 toggleCheckFields();
});
function exportData(file,key){
 const data=localStorage.getItem(key)||'[]';
 const blob=new Blob([data],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=file;
 a.click();
}
const ALL_DATA_KEYS=['customersData','shopsData','factoriesData','productsData','efaInvoices','efaAccounts'];
function downloadJson(file,obj){
 const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=file;
 a.click();
}
function pickJsonFile(onParsed){
 const t=translations[currentLang]||translations.ar;
 const input=document.createElement('input');
 input.type='file';
 input.accept='application/json,.json';
 input.onchange=()=>{
  const file=input.files&&input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
   try{ onParsed(JSON.parse(reader.result)); }
   catch(e){ alert(t.importError); }
  };
  reader.readAsText(file);
 };
 input.click();
}
function importData(key){
 const t=translations[currentLang]||translations.ar;
 pickJsonFile(parsed=>{
  if(!Array.isArray(parsed)){ alert(t.importError); return; }
  if(!confirm(t.importConfirm)) return;
  localStorage.setItem(key,JSON.stringify(parsed));
  load();
  alert(t.importDone);
 });
}
function backupAll(){
 const dump={};
 ALL_DATA_KEYS.forEach(k=>{ dump[k]=JSON.parse(localStorage.getItem(k)||'[]'); });
 downloadJson('efa_backup.json',dump);
}
function restoreAll(){
 const t=translations[currentLang]||translations.ar;
 pickJsonFile(parsed=>{
  if(!parsed||typeof parsed!=='object'||Array.isArray(parsed)){ alert(t.importError); return; }
  if(!confirm(t.restoreConfirm)) return;
  ALL_DATA_KEYS.forEach(k=>{ if(Array.isArray(parsed[k])) localStorage.setItem(k,JSON.stringify(parsed[k])); });
  load();
  alert(t.importDone);
 });
}
function confirmDelete(){

 } else {
 accountView.innerHTML='<div>'+t.noAccounts+'</div>';
 }

// dashboard: upcoming checks
try{
 const dashboard=document.getElementById('dashboard');
 const checks=acc.filter(a=>a.currency==='CHK'&&a.finalDate);
 if(checks.length){
   const list=checks.map(c=>`<div><strong>${escapeHtml(c.entityCode||c.entityName)}</strong> ${escapeHtml(c.amount)} ${escapeHtml(c.currency)}<br>${t.checkDateLabel}: ${escapeHtml(c.checkDate||'')} <br>${t.finalDateLabel}: ${escapeHtml(c.finalDate||'')}</div>`).join('<hr>');
   let upcoming=document.getElementById('upcomingChecks');
   if(!upcoming){
     upcoming=document.createElement('div'); upcoming.id='upcomingChecks';
     dashboard.querySelector('.card').appendChild(upcoming);
   }
   upcoming.innerHTML='<h4>'+t.upcomingChecksTitle+'</h4>'+list;
 } else {
   const uc=document.getElementById('upcomingChecks'); if(uc) uc.innerHTML='';
 }
}catch(e){}
// dashboard: low stock alerts
try{
 const dashboard=document.getElementById('dashboard');
 const low=lowStockProducts();
 let lowBox=document.getElementById('lowStockAlerts');
 if(low.length){
   const list=low.map(p=>`<div><strong>${escapeHtml(p.code||p.name)}</strong> ${escapeHtml(p.name||'')} \u2014 ${t.prodOnHandHeader}: ${productOnHand(p).toFixed(2)} (${t.prodReorderHeader}: ${escapeHtml(p.reorder||'')})</div>`).join('<hr>');
   if(!lowBox){ lowBox=document.createElement('div'); lowBox.id='lowStockAlerts'; dashboard.querySelector('.card').appendChild(lowBox); }
   lowBox.innerHTML='<h4>'+t.lowStockTitle+'</h4>'+list;
 } else if(lowBox){ lowBox.innerHTML=''; }
}catch(e){}
 renderReports();
 if(currentInvoiceEditIndex<0) setNextInvoiceNumber();
 populateInvoiceSelect();
}
